# Legacy: SSH deploy to a single server. The canonical frontend host is Vercel
# (see DEPLOY-VERCEL.md). This workflow only runs when invoked manually.
name: Deploy Frontend (legacy SSH)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Frontend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: /deploy-frontend.sh
